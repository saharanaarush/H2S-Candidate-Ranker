ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Used Claude for spec analysis, architecture discussion, and to help
  author and review the scoring/reasoning code. No candidate data was sent to any
  hosted LLM during ranking. The ranking step is pure-Python, CPU-only, offline.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Transparent feature-based ranker, no LLM in the loop. Seven weighted components
  scored from each profile: title/career bucket (the decisive anti-keyword-stuffer
  signal), NLP/IR domain relevance (penalising vision/speech/robotics-only),
  trust-weighted required skills (endorsements + months-used + assessment scores
  discount "expert" claims with zero backing), 5-9yr experience fit, product-company
  vs services-only history, Pune/Noida location fit, and education. A multiplicative
  behavioural-availability modifier down-weights inactive / low-response / not-open
  candidates. An honeypot gate detects impossible profiles (date-vs-duration
  mismatches, "expert" skills with 0 months used, tenure exceeding total experience)
  and sinks them below the cutoff. A small evidence-based tie-break orders saturated
  top candidates by merit rather than candidate_id. Runtime ~55s for 100K candidates
  on one CPU core; stdlib only.

